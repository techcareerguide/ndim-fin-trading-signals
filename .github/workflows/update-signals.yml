name: Update Stock Signals

on:
  schedule:
    # Runs Monday-Friday at 4:00, 6:00, 8:00, and 10:00 UTC (9:30 AM, 11:30 AM, 1:30 PM, 3:30 PM IST)
    - cron: '0 4,6,8,10 * * 1-5'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Live Stock Feeds
        run: node scripts/fetchData.cjs

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/stocks.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "data: scheduled hourly update of indian stock signals" && git push)
